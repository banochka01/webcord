services:
  postgres:
    image: postgres:15-alpine
    container_name: webcord-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: webcord
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: webcord
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webcord -d webcord"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webcord-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://webcord:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/webcord?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CLIENT_URL: ${CLIENT_URL:-https://webcordes.ru}
    volumes:
      - backend_uploads:/app/uploads
    expose:
      - "3000"
    command: sh -c "npm run db:push && npm run start"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        VITE_API_URL: /api
    container_name: webcord-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  backend_uploads:
