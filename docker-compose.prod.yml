services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: webcord
      POSTGRES_PASSWORD: webcord
      POSTGRES_DB: webcord
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://webcord:webcord@postgres:5432/webcord?schema=public
      JWT_SECRET: ${JWT_SECRET:-please_change_me}
      CLIENT_URL: ${CLIENT_URL:-https://example.com}
    depends_on:
      - postgres
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        VITE_API_URL: /api
    depends_on:
      - backend
    ports:
      - "80:80"
    # For TLS termination, mount certs and add 443 mapping:
    # ports:
    #   - "80:80"
    #   - "443:443"
    # volumes:
    #   - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped

volumes:
  pgdata_prod:
